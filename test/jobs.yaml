jobs:
  - name: extract-data
    cron: "0 2 * * *"
    command: ["sh", "-c", "echo Extracting data from $SOURCE_URL in batches of $BATCH_SIZE"]
    env:
      SOURCE_URL: "https://api.example.com/data"
      BATCH_SIZE: "1000"

  - name: transform-data
    dependsOn: ["extract-data"]
    command: ["sh", "-c", "echo Transforming data from $INPUT_PATH to $OUTPUT_PATH"]
    env:
      INPUT_PATH: "/data/raw"
      OUTPUT_PATH: "/data/processed"

  - name: validate-data
    dependsOn: ["transform-data"]
    command: ["sh", "-c", "echo Validating data at $DATA_PATH"]
    env:
      DATA_PATH: "/data/processed"

  - name: cleanup-old-data
    cron: "0 0 * * 0"
    command: ["sh", "-c", "echo Cleaning up data older than $RETENTION_DAYS days"]
    env:
      RETENTION_DAYS: "30"

  - name: lineage-demo
    command: ["python", "lineage_demo.py"]
    env:
      LINEAGE_PROVIDER: "logging"
      VALIDATION_PROVIDER: "null"
      OPENLINEAGE_NAMESPACE: "demo"
      OPENLINEAGE_JOB_NAME: "lineage-demo"
      S3_ENDPOINT: "http://localhost:9000"
      BRONZE_ACCESS_KEY: "minioadmin"
      BRONZE_SECRET_KEY: "minioadmin"
      BRONZE_BUCKET: "bronze"
      SILVER_ACCESS_KEY: "minioadmin"
      SILVER_SECRET_KEY: "minioadmin"
      SILVER_BUCKET: "silver"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"

  - name: orders-upload
    command: ["python", "orders_upload.py"]
    env:
      LINEAGE_PROVIDER: "openlineage"
      OPENLINEAGE_URL: "http://localhost:5000/api/v1/lineage"
      OPENLINEAGE_NAMESPACE: "demo"
      S3_ENDPOINT: "http://localhost:9000"
      BRONZE_ACCESS_KEY: "minioadmin"
      BRONZE_SECRET_KEY: "minioadmin"
      BRONZE_BUCKET: "bronze"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"

  - name: orders-demo2
    command: ["python", "orders_demo2.py"]
    env:
      LINEAGE_PROVIDER: "openlineage"
      OPENLINEAGE_URL: "http://localhost:5000/api/v1/lineage"
      OPENLINEAGE_NAMESPACE: "demo"
      S3_ENDPOINT: "http://localhost:9000"
      BRONZE_ACCESS_KEY: "minioadmin"
      BRONZE_SECRET_KEY: "minioadmin"
      BRONZE_BUCKET: "bronze"
      SILVER_ACCESS_KEY: "minioadmin"
      SILVER_SECRET_KEY: "minioadmin"
      SILVER_BUCKET: "silver"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"

  - name: orders-bronze-to-silver
    command: ["python", "validation_marquez_demo.py"]
    env:
      LINEAGE_PROVIDER: "openlineage"
      OPENLINEAGE_URL: "http://localhost:5000/api/v1/lineage"
      OPENLINEAGE_NAMESPACE: "demo"
      S3_ENDPOINT: "http://localhost:9000"
      BRONZE_ACCESS_KEY: "minioadmin"
      BRONZE_SECRET_KEY: "minioadmin"
      BRONZE_BUCKET: "bronze"
      SILVER_ACCESS_KEY: "minioadmin"
      SILVER_SECRET_KEY: "minioadmin"
      SILVER_BUCKET: "silver"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"
