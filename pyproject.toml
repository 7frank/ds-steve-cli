[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "steve-cli"
version = "0.1.0"
description = "A simple CLI tool to run jobs from jobs.yaml with proper environment setup"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Frank", email = "frank@example.com"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.8"
dependencies = [
    "click>=8.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=22.0",
    "isort>=5.0",
]

[project.scripts]
steve = "steve_cli.cli:main"

[project.urls]
Homepage = "https://github.com/your-org/tilt-ts-4"
Repository = "https://github.com/your-org/tilt-ts-4"

[tool.setuptools.packages.find]
where = ["."]
include = ["steve_cli*"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.isort]
profile = "black"